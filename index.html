<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPER INFOS | Database</title>
    <style>
        :root { --gold: #f1c40f; --blue: #3498db; --bg: #0a0b10; --success: #2ecc71; }
        body { background: var(--bg); color: white; font-family: 'Arial Black', sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 25px; border-bottom: 4px solid var(--gold); background: #12141c; margin-bottom: 30px; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: #1c1f26; 
            border-radius: 15px; 
            padding: 12px; 
            text-align: center; 
            border: 2px solid #333; 
            transition: 0.2s;
            cursor: pointer;
        }
        .card:hover { border-color: var(--gold); transform: scale(1.05); }
        .card img { 
            width: 100%; 
            border-radius: 10px; 
            aspect-ratio: 1/1; 
            object-fit: cover;
            background: #000;
        }
        .name { margin-top: 10px; font-size: 0.85em; text-transform: uppercase; color: #fff; }

        /* Modal / Bilgi Paneli */
        #modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; 
            backdrop-filter: blur(5px); 
        }
        .modal-box { 
            background: #1c1f26; width: 90%; max-width: 400px; border-radius: 20px; 
            padding: 25px; border: 2px solid var(--gold); text-align: center; 
        }
        .m-img { width: 120px; border-radius: 15px; border: 2px solid var(--gold); margin-bottom: 15px; }
        .m-desc { 
            background: #2d3436; padding: 15px; border-radius: 10px; text-align: left; 
            border-left: 5px solid var(--success); font-family: sans-serif; font-size: 0.95em;
        }
        .close { float: right; cursor: pointer; color: #ff4d4d; font-size: 25px; }
    </style>
</head>
<body>

<header><h1>VIPER INFOS</h1></header>

<div class="grid" id="mainGrid"></div>

<div id="modal">
    <div class="modal-box">
        <span class="close" onclick="closeM()">&times;</span>
        <img id="mImg" class="m-img" src="">
        <h2 id="mTitle" style="color:var(--gold); margin-bottom:15px;"></h2>
        <div id="mDesc" class="m-desc"></div>
    </div>
</div>

<script>
    const data = [
        { n: "SIRIUS", i: "sirius.jpeg", d: "Güneş enerjisiyle çalışan mermiler atar. Süper özelliğiyle bir gölge kopyası oluşturur." },
        { n: "BUZZ", i: "Screenshot 2026-03-17 13.00.02.png", d: "Fırlattığı kanca ile rakiplerine tutunur ve yanlarına uçarak onları kısa süreliğine sersemletir." },
        { n: "BYRON", i: "https://cdn.brawlstats.com/character-arts/16000044.png", d: "Rakipleri zamanla zayıflatır, dostlarını iyileştirir. Stratejik destek sağlar." },
        { n: "CROW", i: "https://cdn.brawlstats.com/character-arts/16000017.png", d: "Zehirli hançerler fırlatır. Süper özelliği havalanarak etrafına zehirli hançerler saçar." }
    ];

    // Geri kalan 100'e kadar olan kutuları "Gizli Veri" olarak ekle (Siyah ekran olmasın diye)
    for(let i=5; i<=100; i++) {
        data.push({ n: "DATA-" + i, i: "", d: "Bu karakter için teknik analiz henüz yüklenmedi. Veritabanı güncelleniyor..." });
    }

    const grid = document.getElementById('mainGrid');
    data.forEach(b => {
        const card = document.createElement('div');
        card.className = 'card';
        const imgSrc = b.i || `https://placehold.co/200/1c1f26/333?text=?`;
        card.innerHTML = `<img src="${imgSrc}"><div class="name">${b.n}</div>`;
        card.onclick = () => {
            document.getElementById('mTitle').innerText = b.n;
            document.getElementById('mImg').src = imgSrc;
            document.getElementById('mDesc').innerText = b.d;
            document.getElementById('modal').style.display = 'flex';
        };
        grid.appendChild(card);
    });

    function closeM() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
